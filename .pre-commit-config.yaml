repos:
  - repo: builtin
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude --exit-non-zero-on-format
        language: system
        types_or: [python, pyi]

      - id: flake8
        name: flake8
        entry: uv run flake8 src tests
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: ty-check
        name: ty check
        entry: uv run ty check src tests
        language: system
        pass_filenames: false
