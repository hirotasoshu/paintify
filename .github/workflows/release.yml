name: "Release"

on:
  release:
    types:
      - "published"

jobs:
  publish:
    name: "Publish to PyPI"
    runs-on: "ubuntu-latest"
    environment:
      name: "pypi"
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v6.0.2"

      - name: "Install uv"
        uses: "astral-sh/setup-uv@v8.1.0"
        with:
          python-version: "3.14.3"
          enable-cache: true

      - name: "Build distributions"
        run: "uv build"

      - name: "Publish distributions"
        run: "uv publish"
