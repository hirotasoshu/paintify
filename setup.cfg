[flake8]
max-line-length = 100
max-cognitive-score = 8
max-cognitive-average = 6
max-complexity = 8
max-imports = 14
max-module-members = 12
max-methods = 10
max-local-variables = 8
max-arguments = 6
ignore =
  # Ruff handles whitespace/formatting.
  E203,
  W503,
  # Keep wemake focused on useful complexity/readability pressure here.
  WPS110,
  WPS111,
  WPS202,
  WPS204,
  WPS210,
  WPS211,
  WPS214,
  WPS221,
  WPS226,
  WPS229,
  WPS231,
  WPS237,
  WPS238,
  WPS300,
  WPS301,
  WPS305,
  WPS306,
  WPS318,
  WPS331,
  WPS332,
  WPS335,
  WPS336,
  WPS337,
  WPS338,
  WPS348,
  WPS352,
  WPS355,
  WPS358,
  WPS407,
  WPS410,
  WPS412,
  WPS420,
  WPS430,
  WPS432,
  WPS433,
  WPS437,
  WPS440,
  WPS441,
  WPS463,
  WPS478,
  WPS507,
  WPS504,
  WPS602,
  WPS604,
  WPS615,
  WPS404,
  WPS459,
  WPS115,
  WPS349,
per-file-ignores =
  tests/*.py: S101,WPS118,WPS204,WPS210,WPS211,WPS214,WPS218,WPS221,WPS226,WPS230,WPS334,WPS431,WPS432,WPS442,WPS601
